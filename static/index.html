<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo PDF Pipeline</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f3f0;
            --surface: #ffffff;
            --surface-hover: #fafaf8;
            --border: #e2ddd5;
            --border-light: #ede9e3;
            --text: #2c2a26;
            --text-sec: #6b6560;
            --text-muted: #9e9890;
            --claude: #2B5B84;
            --claude-bg: #eef4fa;
            --claude-light: #3a7ab5;
            --google: #1A7D3F;
            --google-bg: #edf5ef;
            --google-light: #25a050;
            --warning: #8a6d2b;
            --warning-bg: #fdf5e6;
            --error: #9b3b3b;
            --error-bg: #fceeed;
            --hw-color: #6b5b3a;
            --hw-bg: #faf6ed;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --radius: 10px;
            --radius-lg: 14px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* Header */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 36px; height: 36px; background: var(--claude);
            border-radius: 9px; display: flex; align-items: center;
            justify-content: center; font-size: 17px; color: white;
        }
        .logo h1 { font-size: 19px; font-weight: 700; letter-spacing: -0.3px; }
        .logo span { font-size: 12px; color: var(--text-muted); }

        .container { max-width: 1400px; margin: 0 auto; padding: 28px; }

        /* API Key Banner */
        .key-banner {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-sm);
        }
        .key-banner h3 { font-size: 14px; font-weight: 600; margin-bottom: 14px; }
        .key-row { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; }
        .key-field { flex: 1; min-width: 280px; }
        .key-field label {
            display: flex; align-items: center; gap: 8px;
            font-size: 12px; font-weight: 600; color: var(--text-sec);
            margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px;
        }
        .key-field .dot {
            width: 8px; height: 8px; border-radius: 50%;
        }
        .dot-ok { background: var(--google); }
        .dot-missing { background: var(--error); }
        .key-field input {
            width: 100%; padding: 10px 14px; border: 1px solid var(--border);
            border-radius: 8px; font-family: 'JetBrains Mono', monospace;
            font-size: 13px; background: var(--surface-hover);
            transition: border-color 0.15s;
        }
        .key-field input:focus { outline: none; border-color: var(--claude); }
        .key-field input::placeholder { color: var(--text-muted); }

        /* Upload */
        .upload-zone {
            border: 2px dashed var(--border); border-radius: var(--radius-lg);
            background: var(--surface); padding: 44px; text-align: center;
            cursor: pointer; transition: all 0.2s; margin-bottom: 28px;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--claude); background: var(--claude-bg);
        }
        .upload-icon { font-size: 44px; margin-bottom: 12px; opacity: 0.7; }
        .upload-zone h2 { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
        .upload-zone p { color: var(--text-sec); font-size: 13px; }
        .upload-zone input[type="file"] { display: none; }

        /* Document Card */
        .doc-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-lg); padding: 24px; margin-bottom: 24px;
            box-shadow: var(--shadow-sm);
        }
        .doc-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px;
        }
        .doc-title { display: flex; align-items: center; gap: 12px; }
        .file-icon {
            width: 40px; height: 40px; background: var(--error-bg);
            border-radius: 8px; display: flex; align-items: center;
            justify-content: center; font-size: 18px;
        }
        .doc-title h3 { font-size: 15px; font-weight: 600; }
        .doc-title .meta { font-size: 12px; color: var(--text-muted); }
        .doc-actions { display: flex; gap: 10px; align-items: center; }

        /* Buttons */
        .btn {
            display: inline-flex; align-items: center; gap: 7px;
            padding: 10px 18px; border-radius: 8px; font-family: 'DM Sans';
            font-size: 13px; font-weight: 600; border: none; cursor: pointer;
            transition: all 0.15s;
        }
        .btn-claude { background: var(--claude); color: white; }
        .btn-claude:hover { background: var(--claude-light); }
        .btn-google { background: var(--google); color: white; }
        .btn-google:hover { background: var(--google-light); }
        .btn-secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
        .btn-secondary:hover { border-color: var(--claude); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Badges */
        .badge {
            padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600;
        }
        .badge-ready { background: var(--claude-bg); color: var(--claude); }
        .badge-processing { background: var(--warning-bg); color: var(--warning); }
        .badge-complete { background: var(--google-bg); color: var(--google); }
        .badge-error { background: var(--error-bg); color: var(--error); }

        /* Progress */
        .progress-bar {
            width: 100%; height: 5px; background: var(--border-light);
            border-radius: 3px; overflow: hidden; margin: 14px 0;
        }
        .progress-fill {
            height: 100%; border-radius: 3px; transition: width 0.4s;
        }
        .fill-claude { background: var(--claude); }
        .fill-google { background: var(--google); }

        /* Comparison Layout */
        .comparison {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 20px; margin-top: 20px;
        }
        .panel {
            border: 1px solid var(--border); border-radius: var(--radius);
            overflow: hidden;
        }
        .panel-header {
            padding: 12px 18px; font-size: 13px; font-weight: 700;
            color: white; display: flex; align-items: center;
            justify-content: space-between;
        }
        .panel-header.claude { background: var(--claude); }
        .panel-header.google { background: var(--google); }
        .panel-header .stats { font-weight: 400; font-size: 12px; opacity: 0.85; }
        .panel-body { padding: 16px; max-height: 600px; overflow-y: auto; }

        /* View Tabs */
        .view-tabs { display: flex; gap: 4px; margin-bottom: 16px; }
        .view-tab {
            padding: 7px 14px; background: var(--surface-hover);
            border: 1px solid var(--border-light); border-radius: 6px;
            font-family: 'DM Sans'; font-size: 12px; font-weight: 500;
            color: var(--text-sec); cursor: pointer; transition: all 0.15s;
        }
        .view-tab:hover { border-color: var(--claude); }
        .view-tab.active { background: var(--claude-bg); border-color: var(--claude); color: var(--claude); }

        /* Sections */
        .section-item {
            padding: 12px 14px; border: 1px solid var(--border-light);
            border-radius: 7px; margin-bottom: 6px; font-size: 13px;
        }
        .section-item.handwritten {
            border-left: 3px solid var(--hw-color); background: var(--hw-bg);
        }
        .section-label {
            font-size: 10px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.4px; color: var(--text-muted); margin-bottom: 3px;
            display: flex; align-items: center; gap: 6px;
        }
        .type-badge {
            padding: 1px 6px; border-radius: 3px; font-size: 9px;
            background: var(--claude-bg); color: var(--claude);
        }
        .type-badge.checkbox { background: #f0e6ff; color: #6b21a8; }
        .check-mark { font-size: 14px; margin-right: 4px; }
        .section-item.checkbox-checked { border-left: 3px solid #16a34a; background: #f0fdf4; }
        .section-item.checkbox-unchecked { border-left: 3px solid #d1d5db; }
        .hw-badge {
            padding: 1px 6px; border-radius: 3px; font-size: 9px;
            background: var(--hw-bg); color: var(--hw-color); border: 1px solid #d4c9a8;
        }
        .confidence { margin-left: auto; font-size: 10px; }
        .conf-high { color: var(--google); }
        .conf-medium { color: var(--warning); }
        .conf-low { color: var(--error); }
        .section-content { line-height: 1.5; white-space: pre-wrap; }
        .section-item.handwritten .section-content {
            font-family: 'JetBrains Mono', monospace; font-style: italic;
            color: var(--hw-color); font-size: 12px;
        }

        /* Raw Text */
        .raw-text {
            font-family: 'JetBrains Mono', monospace; font-size: 12px;
            line-height: 1.65; background: #2c2a26; color: #e8e3db;
            padding: 20px; border-radius: var(--radius); white-space: pre-wrap;
            max-height: 500px; overflow-y: auto;
        }

        /* Image Preview */
        .image-preview {
            margin-top: 20px; text-align: center;
        }
        .image-preview img {
            max-width: 100%; max-height: 400px; border: 1px solid var(--border);
            border-radius: var(--radius); box-shadow: var(--shadow-md);
        }

        /* Stats Row */
        .stats-row { display: flex; gap: 12px; margin: 16px 0; }
        .stat {
            flex: 1; padding: 14px; background: var(--surface-hover);
            border-radius: 8px; border: 1px solid var(--border-light); text-align: center;
        }
        .stat-value { font-size: 22px; font-weight: 700; }
        .stat-value.claude-color { color: var(--claude); }
        .stat-value.google-color { color: var(--google); }
        .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

        /* Error */
        .error-msg {
            padding: 16px; background: var(--error-bg); border-radius: 8px;
            color: var(--error); font-size: 13px; text-align: center;
        }

        .spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
            border-radius: 50%; animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 900px) {
            .comparison { grid-template-columns: 1fr; }
            .key-row { flex-direction: column; }
            .container { padding: 16px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-icon">📄</div>
            <div>
                <h1>Geo PDF Pipeline</h1>
                <span>Claude Vision vs Google Cloud Vision — side by side</span>
            </div>
        </div>
        <button class="btn btn-secondary" onclick="toggleKeys()" id="keyToggle">🔑 API Keys</button>
    </header>

    <div class="container">
        <!-- API Key Banner -->
        <div class="key-banner" id="keyBanner" style="display:none">
            <h3>🔑 API Keys — enter here or set in .env file</h3>
            <div class="key-row">
                <div class="key-field">
                    <label><span class="dot dot-missing" id="dotClaude"></span> Anthropic (Claude Vision)</label>
                    <input type="password" id="keyAnthropic" placeholder="sk-ant-..." oninput="saveKeys()">
                </div>
                <div class="key-field">
                    <label><span class="dot dot-missing" id="dotGoogle"></span> Google Cloud Vision</label>
                    <input type="password" id="keyGoogle" placeholder="AIza..." oninput="saveKeys()">
                </div>
            </div>
        </div>

        <!-- Upload -->
        <div class="upload-zone" id="uploadZone">
            <div class="upload-icon">📂</div>
            <h2>Drop an image or PDF here</h2>
            <p>PNG, JPG, TIFF, BMP, WebP, or PDF</p>
            <input type="file" id="fileInput" accept=".png,.jpg,.jpeg,.tiff,.tif,.bmp,.webp,.pdf">
        </div>

        <div id="docList"></div>
    </div>

<script>
// ─── State ───
let activeView = 'structured';

// ─── Keys ───
async function checkKeys() {
    const res = await fetch('/api/keys');
    const data = await res.json();
    document.getElementById('dotClaude').className = `dot ${data.anthropic ? 'dot-ok' : 'dot-missing'}`;
    document.getElementById('dotGoogle').className = `dot ${data.google ? 'dot-ok' : 'dot-missing'}`;
    if (!data.anthropic && !data.google) {
        document.getElementById('keyBanner').style.display = 'block';
    }
}

let saveTimer;
function saveKeys() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async () => {
        const anthropic = document.getElementById('keyAnthropic').value.trim();
        const google = document.getElementById('keyGoogle').value.trim();
        const body = {};
        if (anthropic) body.anthropic = anthropic;
        if (google) body.google = google;
        if (Object.keys(body).length) {
            await fetch('/api/keys', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
            checkKeys();
        }
    }, 500);
}

function toggleKeys() {
    const b = document.getElementById('keyBanner');
    b.style.display = b.style.display === 'none' ? 'block' : 'none';
}

// ─── Upload ───
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
    e.preventDefault(); uploadZone.classList.remove('dragover');
    if (e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) uploadFile(e.target.files[0]); });

async function uploadFile(file) {
    const form = new FormData();
    form.append('file', file);
    const res = await fetch('/api/upload', { method: 'POST', body: form });
    const data = await res.json();
    if (data.error) return alert(data.error);
    renderDoc(data);
}

// ─── Render Document ───
function renderDoc(doc) {
    const card = document.createElement('div');
    card.className = 'doc-card';
    card.id = `doc-${doc.id}`;
    card.innerHTML = `
        <div class="doc-header">
            <div class="doc-title">
                <div class="file-icon">📑</div>
                <div><h3>${esc(doc.filename)}</h3><div class="meta">Ready to process</div></div>
            </div>
            <div class="doc-actions">
                <span class="badge badge-ready" id="badge-${doc.id}">Ready</span>
                <button class="btn btn-claude" id="btn-${doc.id}" onclick="processDoc('${doc.id}')">
                    🔍 Run Both Pipelines
                </button>
            </div>
        </div>
        <div id="progress-${doc.id}" style="display:none">
            <div style="display:flex;gap:12px">
                <div style="flex:1">
                    <div style="font-size:12px;color:var(--claude);font-weight:600;margin-bottom:4px">Claude Vision</div>
                    <div class="progress-bar"><div class="progress-fill fill-claude" id="fillC-${doc.id}" style="width:0%"></div></div>
                </div>
                <div style="flex:1">
                    <div style="font-size:12px;color:var(--google);font-weight:600;margin-bottom:4px">Google Cloud Vision</div>
                    <div class="progress-bar"><div class="progress-fill fill-google" id="fillG-${doc.id}" style="width:0%"></div></div>
                </div>
            </div>
            <p style="font-size:12px;color:var(--text-muted);margin-top:8px" id="status-${doc.id}">Starting...</p>
        </div>
        <div class="image-preview"><img src="/api/image/${doc.id}" alt="Uploaded image"></div>
        <div id="results-${doc.id}"></div>
    `;
    document.getElementById('docList').prepend(card);
}

// ─── Process ───
async function processDoc(docId) {
    const btn = document.getElementById(`btn-${docId}`);
    const badge = document.getElementById(`badge-${docId}`);
    const progress = document.getElementById(`progress-${docId}`);
    const status = document.getElementById(`status-${docId}`);
    const fillC = document.getElementById(`fillC-${docId}`);
    const fillG = document.getElementById(`fillG-${docId}`);

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Processing...';
    badge.className = 'badge badge-processing';
    badge.textContent = 'Processing';
    progress.style.display = 'block';

    let pct = 0;
    const iv = setInterval(() => {
        pct = Math.min(pct + Math.random() * 6, 92);
        fillC.style.width = pct + '%';
        fillG.style.width = Math.min(pct * 1.3, 95) + '%';
        if (pct < 25) status.textContent = 'Sending image to both APIs...';
        else if (pct < 60) status.textContent = 'Claude Vision analyzing... Google Cloud Vision analyzing...';
        else status.textContent = 'Parsing results...';
    }, 700);

    try {
        const res = await fetch(`/api/process/${docId}`, { method: 'POST' });
        const data = await res.json();
        clearInterval(iv);

        if (data.error) {
            badge.className = 'badge badge-error';
            badge.textContent = 'Error';
            status.textContent = data.error;
            btn.innerHTML = '🔍 Retry'; btn.disabled = false;
            return;
        }

        fillC.style.width = '100%';
        fillG.style.width = '100%';
        setTimeout(() => { progress.style.display = 'none'; }, 600);
        badge.className = 'badge badge-complete';
        badge.textContent = 'Complete';
        btn.style.display = 'none';

        const actions = btn.parentElement;
        const exportBtn = document.createElement('button');
        exportBtn.className = 'btn btn-secondary';
        exportBtn.innerHTML = '📊 Export Excel';
        exportBtn.onclick = () => window.location.href = `/api/export/${docId}`;
        actions.appendChild(exportBtn);

        renderComparison(docId, data.results);
    } catch(e) {
        clearInterval(iv);
        badge.className = 'badge badge-error';
        badge.textContent = 'Error';
        status.textContent = e.message;
        btn.innerHTML = '🔍 Retry'; btn.disabled = false;
    }
}

// ─── Render Comparison ───
function renderComparison(docId, results) {
    const container = document.getElementById(`results-${docId}`);
    const claude = results.claude || {};
    const google = results.google || {};

    const cSections = (claude.sections || []).length;
    const gSections = (google.sections || []).length;
    const cTime = claude.processing_time || '—';
    const gTime = google.processing_time || '—';
    const cHw = (claude.sections || []).filter(s => s.is_handwritten).length;
    const gHw = (google.sections || []).filter(s => s.is_handwritten).length;

    container.innerHTML = `
        <div class="stats-row">
            <div class="stat"><div class="stat-value claude-color">${cTime}s</div><div class="stat-label">Claude Time</div></div>
            <div class="stat"><div class="stat-value google-color">${gTime}s</div><div class="stat-label">Google Time</div></div>
            <div class="stat"><div class="stat-value claude-color">${cSections}</div><div class="stat-label">Claude Sections</div></div>
            <div class="stat"><div class="stat-value google-color">${gSections}</div><div class="stat-label">Google Sections</div></div>
            <div class="stat"><div class="stat-value">${cHw} / ${gHw}</div><div class="stat-label">Handwritten (C/G)</div></div>
        </div>

        <div class="view-tabs">
            <button class="view-tab active" onclick="setView('${docId}','structured',this)">Structured</button>
            <button class="view-tab" onclick="setView('${docId}','raw',this)">Raw Text</button>
        </div>

        <div class="comparison" id="comp-${docId}"></div>
    `;

    container._results = results;
    renderView(docId, 'structured');
}

function setView(docId, view, btn) {
    activeView = view;
    btn.parentElement.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderView(docId, view);
}

function renderView(docId, view) {
    const container = document.getElementById(`results-${docId}`);
    const comp = document.getElementById(`comp-${docId}`);
    const results = container._results;
    const claude = results.claude || {};
    const google = results.google || {};

    if (view === 'structured') {
        comp.innerHTML = `
            <div class="panel">
                <div class="panel-header claude">Claude Vision <span class="stats">${claude.model || ''}</span></div>
                <div class="panel-body">${claude.error && !claude.sections?.length
                    ? `<div class="error-msg">⚠️ ${esc(claude.error)}</div>`
                    : renderSections(claude.sections || [])}</div>
            </div>
            <div class="panel">
                <div class="panel-header google">Google Cloud Vision <span class="stats">${google.total_blocks || 0} blocks</span></div>
                <div class="panel-body">${google.error && !google.sections?.length
                    ? `<div class="error-msg">⚠️ ${esc(google.error)}</div>`
                    : renderSections(google.sections || [])}</div>
            </div>
        `;
    } else {
        comp.innerHTML = `
            <div class="panel">
                <div class="panel-header claude">Claude Vision — Raw Text</div>
                <div class="panel-body">${claude.error && !claude.raw_text
                    ? `<div class="error-msg">⚠️ ${esc(claude.error)}</div>`
                    : `<div class="raw-text">${esc(claude.raw_text || '')}</div>`}</div>
            </div>
            <div class="panel">
                <div class="panel-header google">Google Cloud Vision — Raw Text</div>
                <div class="panel-body">${google.error && !google.raw_text
                    ? `<div class="error-msg">⚠️ ${esc(google.error)}</div>`
                    : `<div class="raw-text">${esc(google.raw_text || '')}</div>`}</div>
            </div>
        `;
    }
}

function renderSections(sections) {
    if (!sections.length) return '<div style="padding:20px;text-align:center;color:var(--text-muted)">No sections extracted</div>';
    return sections.map(s => {
        const isCb = s.is_checkbox || s.type === 'checkbox';
        const cbClass = isCb ? (s.checked ? 'checkbox-checked' : 'checkbox-unchecked') : '';
        const hwClass = s.is_handwritten ? 'handwritten' : '';
        return `
        <div class="section-item ${hwClass} ${cbClass}">
            <div class="section-label">
                ${isCb ? `<span class="check-mark">${s.checked ? '☑' : '☐'}</span>` : ''}
                ${s.label ? `<strong>${esc(s.label)}</strong>` : ''}
                <span class="type-badge ${isCb ? 'checkbox' : ''}">${esc(s.type || 'text')}</span>
                ${s.is_handwritten ? '<span class="hw-badge">✍️ handwritten</span>' : ''}
                <span class="confidence conf-${s.confidence || 'medium'}">${s.confidence || ''}${s.google_confidence != null ? ' (' + s.google_confidence + ')' : ''}</span>
            </div>
            <div class="section-content">${esc(s.content || '') || '<em style="color:var(--text-muted)">(empty)</em>'}</div>
        </div>`;
    }).join('');
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// Init
checkKeys();
</script>
</body>
</html>
